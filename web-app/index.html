<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce - Pro UI</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <!-- App Container -->
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <h1>E-Commerce Store Pro</h1>
          <p>Security, Search, Upload, Payments</p>
        </div>
        <div class="user-auth">
          <span id="userInfo" style="display:none; font-weight:bold; margin-right:1rem;"></span>
          <button id="btnAdminDashboard" class="btn-primary" style="display:none; background: #ef4444;">Admin Panel</button>
          <button id="btnLoginOpen" class="btn-secondary">Kirish</button>
          <button id="btnNewUser" class="btn-primary">Ro'yxatdan O'tish</button>
          <button id="btnLogout" class="btn-secondary" style="display:none;">Chiqish</button>
        </div>
      </header>

      <!-- Search & Filters -->
      <div class="search-bar">
        <input type="text" id="searchTitle" placeholder="Mahsulot qidirish...">
        <select id="searchCategory">
          <option value="">Barcha Kategoriyalar</option>
        </select>
        <input type="number" id="searchMinPrice" placeholder="Min $">
        <input type="number" id="searchMaxPrice" placeholder="Max $">
      </div>

      <!-- Add Product (Admin Only) -->
      <div class="actions-bar" id="adminActions" style="display:none;">
        <button id="btnNewProduct" class="btn-primary">+ Yangi Mahsulot</button>
      </div>

      <!-- Cart Button -->
      <div id="floatingCart" class="floating-cart">
        🛒 Savat (<span id="cartCount">0</span>)
      </div>

      <!-- Products Grid -->
      <div id="productGrid" class="product-grid">
        <!-- Products will be rendered here via TS -->
      </div>
    </div>

    <!-- Modals Container -->
    <div id="modalOverlay" class="modal-overlay hidden">
      
      <!-- Login Modal -->
      <div id="loginModal" class="modal hidden">
        <h2>Tizimga Kirish</h2>
        <form id="loginForm">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="input-group">
            <label>Parol</label>
            <input type="password" id="loginPassword" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary close-modal">Bekor qilish</button>
            <button type="submit" class="btn-primary">Kirish</button>
          </div>
        </form>
      </div>

      <!-- New User Modal -->
      <div id="userModal" class="modal hidden">
        <h2>Ro'yxatdan O'tish</h2>
        <form id="userForm">
          <div class="input-group">
            <label>Ism</label>
            <input type="text" id="userName" required>
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="userEmail" required>
          </div>
          <div class="input-group">
            <label>Parol</label>
            <input type="password" id="userPassword" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary close-modal">Bekor qilish</button>
            <button type="submit" class="btn-primary">Saqlash</button>
          </div>
        </form>
      </div>

      <!-- New Product Modal -->
      <div id="productModal" class="modal hidden">
        <h2>Yangi Mahsulot (Admin)</h2>
        <form id="productForm">
          <div class="input-group">
            <label>Nomi</label>
            <input type="text" id="productTitle" required>
          </div>
          <div class="input-group">
            <label>Narxi ($)</label>
            <input type="number" step="0.01" id="productPrice" required>
          </div>
          <div class="input-group">
            <label>Kategoriya</label>
            <select id="productCategory" required></select>
          </div>
          <div class="input-group">
            <label>Rasm yuklash</label>
            <input type="file" id="productImage" accept="image/*">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary close-modal">Bekor qilish</button>
            <button type="submit" class="btn-primary">Qo'shish</button>
          </div>
        </form>
      </div>

      <!-- Review Modal -->
      <div id="reviewModal" class="modal hidden">
        <h2>Sharh Qoldirish</h2>
        <form id="reviewForm">
          <input type="hidden" id="reviewProductId">
          <div class="input-group">
            <label>Baho (1-5)</label>
            <input type="number" min="1" max="5" id="reviewRating" required>
          </div>
          <div class="input-group">
            <label>Izoh</label>
            <input type="text" id="reviewComment" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary close-modal">Bekor qilish</button>
            <button type="submit" class="btn-primary">Jo'natish</button>
          </div>
        </form>
      </div>

      <!-- Cart Modal -->
      <div id="cartModal" class="modal cart-modal hidden">
        <h2>Sizning Savatingiz</h2>
        <div id="cartItemsContainer"></div>
        <div class="cart-total">
          Jami: $<span id="cartTotalPrice">0.00</span>
        </div>
        <hr style="margin: 1rem 0; border-color: rgba(255,255,255,0.1);">
        <div class="input-group" id="paymentSection" style="display:none;">
          <label>Karta Raqami (Stripe Mock)</label>
          <input type="text" id="creditCard" placeholder="1234 5678 1234 5678" maxlength="16">
        </div>
        <div class="modal-actions mt-2">
          <button type="button" class="btn-secondary close-modal">Yopish</button>
          <button type="button" id="btnPlaceOrder" class="btn-primary" style="display: none;">Xarid Qilish</button>
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
